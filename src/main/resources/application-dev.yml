# 개발 프로파일: H2 인메모리 (설치 불필요, 바로 실행)
spring:
  datasource:
    url: jdbc:h2:mem:wellhouse;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

# 개발에선 MQTT 브로커 없이 부팅 (펌웨어 연동은 REST 폴백 사용 가능)
wellhouse:
  mqtt:
    enabled: false
