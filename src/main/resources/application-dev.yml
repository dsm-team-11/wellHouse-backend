# 개발 프로파일: H2 파일 기반 (설치 불필요 + 재시작해도 데이터 유지)
# 데이터는 ./data/wellhouse.mv.db 에 저장 → 백엔드를 껐다 켜도 계정/로그인 유지.
# AUTO_SERVER=TRUE 로 외부 DB 툴 동시 접속도 허용.
spring:
  datasource:
    url: jdbc:h2:file:./data/wellhouse;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

# 개발에선 MQTT 브로커 없이 부팅 (펌웨어 연동은 REST 폴백 사용 가능)
wellhouse:
  mqtt:
    enabled: false
