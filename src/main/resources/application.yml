spring:
  application:
    name: wellhouse-backend
  profiles:
    active: dev
  # 메일(SMTP): 비밀번호 재설정 인증코드 발송용. 기본값은 Gmail SMTP.
  # 실제 발송하려면 WELLHOUSE_MAIL_ENABLED=true + MAIL_USERNAME/MAIL_PASSWORD(Gmail 앱 비밀번호) 설정.
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# 애플리케이션 설정
wellhouse:
  jwt:
    # 운영에서는 환경변수 WELLHOUSE_JWT_SECRET 로 주입 (Base64, 256bit 이상)
    secret: ${WELLHOUSE_JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWNoYW5nZS1tZS1wbGVhc2UtMzJieXRlcyE=}
    # 로그인 세션 유지: 30일(=43200분). 앱은 토큰을 SharedPreferences에 보관하므로
    # 이 기간 동안 재로그인 없이 유지된다. (운영에선 짧게 두고 refresh 토큰 권장)
    access-token-ttl-minutes: 43200
    device-token-ttl-days: 3650
  mqtt:
    enabled: ${WELLHOUSE_MQTT_ENABLED:true}
    broker-url: ${WELLHOUSE_MQTT_URL:tcp://localhost:1883}
    client-id: wellhouse-server
    username: ${WELLHOUSE_MQTT_USER:}
    password: ${WELLHOUSE_MQTT_PASS:}
  fcm:
    # 서비스 계정 JSON 경로. 없으면 푸시는 로그만 남기고 skip.
    enabled: ${WELLHOUSE_FCM_ENABLED:false}
    credentials-path: ${WELLHOUSE_FCM_CREDENTIALS:}
  mail:
    # true 여야 실제 SMTP 발송. false(기본)면 인증코드를 서버 로그로만 출력(개발 편의).
    enabled: ${WELLHOUSE_MAIL_ENABLED:false}
    from: ${WELLHOUSE_MAIL_FROM:no-reply@wellhouse.app}
  weather:
    regions: seoul,incheon,gyeonggi
    kma-service-key: ${KMA_SERVICE_KEY:}

logging:
  level:
    com.wellhouse: DEBUG
