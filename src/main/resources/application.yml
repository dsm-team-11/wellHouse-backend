spring:
  application:
    name: wellhouse-backend
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# 애플리케이션 설정
wellhouse:
  jwt:
    # 운영에서는 환경변수 WELLHOUSE_JWT_SECRET 로 주입 (Base64, 256bit 이상)
    secret: ${WELLHOUSE_JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWNoYW5nZS1tZS1wbGVhc2UtMzJieXRlcyE=}
    access-token-ttl-minutes: 120
    device-token-ttl-days: 3650
  mqtt:
    enabled: ${WELLHOUSE_MQTT_ENABLED:true}
    broker-url: ${WELLHOUSE_MQTT_URL:tcp://localhost:1883}
    client-id: wellhouse-server
    username: ${WELLHOUSE_MQTT_USER:}
    password: ${WELLHOUSE_MQTT_PASS:}
  fcm:
    # 서비스 계정 JSON 경로. 없으면 푸시는 로그만 남기고 skip.
    enabled: ${WELLHOUSE_FCM_ENABLED:false}
    credentials-path: ${WELLHOUSE_FCM_CREDENTIALS:}
  weather:
    regions: seoul,incheon,gyeonggi
    kma-service-key: ${KMA_SERVICE_KEY:}

logging:
  level:
    com.wellhouse: DEBUG
