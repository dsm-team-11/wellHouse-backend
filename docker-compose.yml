services:
  postgres:
    image: postgres:16-alpine
    container_name: wellhouse-postgres
    environment:
      POSTGRES_DB: wellhouse
      POSTGRES_USER: wellhouse
      POSTGRES_PASSWORD: wellhouse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: wellhouse-mqtt
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket (선택)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

volumes:
  pgdata:
